<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>XiaoHuang Control Center</title>
  <link rel="stylesheet" href="assets/style.css">
</head>
<body>
  <div class="app">
    <!-- Hero -->
    <header class="hero">
      <div class="hero-left">
        <h1>XiaoHuang Control Center</h1>
        <p class="hero-sub">本地桌面 AI 助手控制中心</p>
      </div>
      <div class="hero-right">
        <div class="status-badge" id="status-badge">--</div>
        <div class="wake-engine-badge" id="wake-engine-badge">--</div>
      </div>
    </header>

    <!-- Main content: two columns -->
    <main class="main-grid">
      <!-- Left: Status Cards -->
      <section class="col-left">
        <div class="card glass-card" id="card-process">
          <h2 class="card-title">运行状态</h2>
          <div class="card-body" id="status-detail">加载中...</div>
        </div>

        <div class="card glass-card" id="card-config">
          <h2 class="card-title">配置摘要</h2>
          <div class="card-body" id="config-detail">加载中...</div>
        </div>

        <div class="card glass-card" id="card-logs">
          <h2 class="card-title">诊断信息</h2>
          <div class="card-body" id="logs-detail">加载中...</div>
        </div>
      </section>

      <!-- Right: Actions + Settings -->
      <section class="col-right">
        <div class="card glass-card" id="card-actions">
          <h2 class="card-title">快速操作</h2>
          <div class="action-grid" id="action-buttons">
            <button class="btn btn-start" id="btn-start" disabled>启动小黄</button>
            <button class="btn btn-stop" id="btn-stop" disabled>停止小黄</button>
            <button class="btn btn-restart" id="btn-restart" disabled>重启小黄</button>
            <button class="btn btn-refresh" id="btn-refresh">刷新状态</button>
            <button class="btn btn-logs" id="btn-logs">日志路径</button>
          </div>
        </div>

        <div class="card glass-card" id="card-wake-settings">
          <h2 class="card-title">Wake Engine 设置</h2>
          <div class="form-group">
            <label for="wake-engine">Engine</label>
            <select id="wake-engine" class="glass-input">
              <option value="stt_text">stt_text</option>
              <option value="openwakeword">openwakeword</option>
            </select>
          </div>
          <div class="form-group">
            <label class="checkbox-label">
              <input type="checkbox" id="wake-fallback" checked>
              fallback_enabled
            </label>
          </div>
          <div class="form-group">
            <label for="wake-device">device_index</label>
            <input type="number" id="wake-device" class="glass-input" min="0" max="99">
          </div>
          <div class="form-group">
            <label for="wake-cooldown">cooldown_seconds</label>
            <input type="number" id="wake-cooldown" class="glass-input" min="0" max="30" step="0.5">
          </div>
          <div class="form-group">
            <label for="wake-sensitivity">sensitivity</label>
            <input type="number" id="wake-sensitivity" class="glass-input" min="0" max="1" step="0.05">
          </div>
          <div class="action-grid">
            <button class="btn btn-save" id="btn-save-config">保存配置</button>
            <button class="btn btn-save-restart" id="btn-save-restart">保存并重启</button>
          </div>
          <p class="hint" id="wake-restart-hint"></p>
        </div>
      </section>
    </main>

    <!-- Toast -->
    <div class="toast-container" id="toast-container"></div>

    <footer class="footer">
      <p id="footer-info">XiaoHuang V1.3 — Web Control Panel</p>
    </footer>
  </div>

  <script src="assets/app.js"></script>
</body>
</html>
